<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Definiciones -->
  <defs>
    <!-- Gradientes y patrones -->
    <linearGradient id="dataGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#673ab7" />
      <stop offset="100%" stop-color="#9c27b0" />
    </linearGradient>
    
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#455a64" />
      <stop offset="100%" stop-color="#263238" />
    </linearGradient>
    
    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2196f3" />
      <stop offset="100%" stop-color="#90caf9" />
    </linearGradient>
    
    <!-- Patrón de datos binarios -->
    <pattern id="binaryPattern" patternUnits="userSpaceOnUse" width="100" height="100">
      <text x="10" y="20" font-family="monospace" font-size="10" fill="#9575cd">01001</text>
      <text x="30" y="40" font-family="monospace" font-size="10" fill="#9575cd">10101</text>
      <text x="50" y="60" font-family="monospace" font-size="10" fill="#9575cd">01011</text>
      <text x="20" y="80" font-family="monospace" font-size="10" fill="#9575cd">11010</text>
      <text x="60" y="30" font-family="monospace" font-size="10" fill="#9575cd">00111</text>
    </pattern>
    
    <!-- Filtro para sombras -->
    <filter id="shadowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="3" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fondo -->
  <rect width="400" height="300" fill="#f8f8ff" />
  
  <!-- Servidor/Fuente de datos -->
  <g id="server" filter="url(#shadowFilter)">
    <!-- Marco del servidor -->
    <rect x="60" y="100" width="60" height="120" rx="5" fill="url(#serverGradient)" />
    
    <!-- Detalles del servidor -->
    <rect x="65" y="110" width="50" height="5" rx="2" fill="#b0bec5" />
    <rect x="65" y="125" width="50" height="5" rx="2" fill="#b0bec5" />
    <rect x="65" y="140" width="50" height="5" rx="2" fill="#b0bec5" />
    <rect x="65" y="155" width="50" height="5" rx="2" fill="#b0bec5" />
    <rect x="65" y="170" width="50" height="5" rx="2" fill="#b0bec5" />
    <rect x="65" y="185" width="50" height="5" rx="2" fill="#b0bec5" />
    <rect x="65" y="200" width="50" height="5" rx="2" fill="#b0bec5" />
  </g>
  
  <!-- Flujo de datos desde el servidor -->
  <g id="dataFlow">
    <!-- Línea principal de flujo -->
    <path d="M120,140 C160,140 160,160 200,160" fill="none" stroke="url(#dataGradient)" stroke-width="5" stroke-dasharray="5,3">
      <animate 
        attributeName="stroke-dashoffset" 
        values="100;0" 
        dur="3s" 
        repeatCount="indefinite"/>
    </path>
    
    <!-- Ramificaciones del flujo de datos -->
    <path d="M200,160 C240,160 240,120 280,120" fill="none" stroke="url(#dataGradient)" stroke-width="4" stroke-dasharray="5,3">
      <animate 
        attributeName="stroke-dashoffset" 
        values="100;0" 
        dur="3s" 
        repeatCount="indefinite"/>
    </path>
    
    <path d="M200,160 C240,160 240,190 280,190" fill="none" stroke="url(#dataGradient)" stroke-width="4" stroke-dasharray="5,3">
      <animate 
        attributeName="stroke-dashoffset" 
        values="100;0" 
        dur="3s" 
        repeatCount="indefinite"/>
    </path>
    
    <!-- Partículas de datos -->
    <circle cx="140" cy="140" r="4" fill="#7e57c2">
      <animate 
        attributeName="cx" 
        values="120;200" 
        dur="3s" 
        repeatCount="indefinite"/>
      <animate 
        attributeName="opacity" 
        values="0;1;0" 
        dur="3s" 
        repeatCount="indefinite"/>
    </circle>
    
    <circle cx="220" cy="160" r="3" fill="#7e57c2">
      <animate 
        attributeName="cx" 
        values="200;280" 
        dur="3s" 
        begin="1s"
        repeatCount="indefinite"/>
      <animate 
        attributeName="cy" 
        values="160;120" 
        dur="3s" 
        begin="1s"
        repeatCount="indefinite"/>
      <animate 
        attributeName="opacity" 
        values="0;1;0" 
        dur="3s" 
        begin="1s"
        repeatCount="indefinite"/>
    </circle>
    
    <circle cx="220" cy="160" r="3" fill="#7e57c2">
      <animate 
        attributeName="cx" 
        values="200;280" 
        dur="3s" 
        begin="1.5s"
        repeatCount="indefinite"/>
      <animate 
        attributeName="cy" 
        values="160;190" 
        dur="3s" 
        begin="1.5s"
        repeatCount="indefinite"/>
      <animate 
        attributeName="opacity" 
        values="0;1;0" 
        dur="3s" 
        begin="1.5s"
        repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Gráficos visuales -->
  <g id="dataViz" filter="url(#shadowFilter)">
    <!-- Panel superior -->
    <rect x="280" y="90" width="80" height="60" rx="5" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" />
    
    <!-- Gráfico circular -->
    <g id="pieChart">
      <path d="M320,120 L320,100 A20,20 0 0,1 340,120 Z" fill="#4caf50" />
      <path d="M320,120 L340,120 A20,20 0 0,1 320,140 Z" fill="#2196f3" />
      <path d="M320,120 L320,140 A20,20 0 0,1 300,120 Z" fill="#ffc107" />
      <path d="M320,120 L300,120 A20,20 0 0,1 320,100 Z" fill="#f44336" />
      <animate 
        attributeName="opacity" 
        values="0;1" 
        dur="1s" 
        begin="2s"
        fill="freeze"/>
    </g>
    
    <!-- Panel inferior -->
    <rect x="280" y="160" width="80" height="60" rx="5" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" />
    
    <!-- Gráfico de barras -->
    <g id="barChart">
      <rect x="290" y="200" width="8" height="10" fill="url(#chartGradient)">
        <animate 
          attributeName="height" 
          values="0;10" 
          dur="1s" 
          begin="2.5s"
          fill="freeze"/>
        <animate 
          attributeName="y" 
          values="210;200" 
          dur="1s" 
          begin="2.5s"
          fill="freeze"/>
      </rect>
      
      <rect x="305" y="190" width="8" height="20" fill="url(#chartGradient)">
        <animate 
          attributeName="height" 
          values="0;20" 
          dur="1s" 
          begin="2.7s"
          fill="freeze"/>
        <animate 
          attributeName="y" 
          values="210;190" 
          dur="1s" 
          begin="2.7s"
          fill="freeze"/>
      </rect>
      
      <rect x="320" y="180" width="8" height="30" fill="url(#chartGradient)">
        <animate 
          attributeName="height" 
          values="0;30" 
          dur="1s" 
          begin="2.9s"
          fill="freeze"/>
        <animate 
          attributeName="y" 
          values="210;180" 
          dur="1s" 
          begin="2.9s"
          fill="freeze"/>
      </rect>
      
      <rect x="335" y="170" width="8" height="40" fill="url(#chartGradient)">
        <animate 
          attributeName="height" 
          values="0;40" 
          dur="1s" 
          begin="3.1s"
          fill="freeze"/>
        <animate 
          attributeName="y" 
          values="210;170" 
          dur="1s" 
          begin="3.1s"
          fill="freeze"/>
      </rect>
    </g>
  </g>
  
  <!-- Elementos de datos flotantes -->
  <g id="dataElements" filter="url(#shadowFilter)">
    <!-- Siluetas de documentos -->
    <g id="dataFiles">
      <rect x="170" y="100" width="30" height="40" rx="2" fill="#e1f5fe" stroke="#81d4fa" stroke-width="1">
        <animateTransform 
          attributeName="transform" 
          type="translate" 
          values="0,0; 0,-10; 0,0" 
          dur="5s" 
          repeatCount="indefinite"/>
      </rect>
      <rect x="175" y="110" width="20" height="2" rx="1" fill="#81d4fa">
        <animateTransform 
          attributeName="transform" 
          type="translate" 
          values="0,0; 0,-10; 0,0" 
          dur="5s" 
          repeatCount="indefinite"/>
      </rect>
      <rect x="175" y="115" width="20" height="2" rx="1" fill="#81d4fa">
        <animateTransform 
          attributeName="transform" 
          type="translate" 
          values="0,0; 0,-10; 0,0" 
          dur="5s" 
          repeatCount="indefinite"/>
      </rect>
      <rect x="175" y="120" width="20" height="2" rx="1" fill="#81d4fa">
        <animateTransform 
          attributeName="transform" 
          type="translate" 
          values="0,0; 0,-10; 0,0" 
          dur="5s" 
          repeatCount="indefinite"/>
      </rect>
    </g>
    
    <!-- Iconos de tabla de datos -->
    <g id="dataTable">
      <rect x="200" y="190" width="40" height="50" rx="2" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1">
        <animateTransform 
          attributeName="transform" 
          type="translate" 
          values="0,0; 0,10; 0,0" 
          dur="6s" 
          repeatCount="indefinite"/>
      </rect>
      
      <!-- Líneas de la tabla -->
      <line x1="205" y1="200" x2="235" y2="200" stroke="#ce93d8" stroke-width="1">
        <animateTransform 
          attributeName="transform" 
          type="translate" 
          values="0,0; 0,10; 0,0" 
          dur="6s" 
          repeatCount="indefinite"/>
      </line>
      <line x1="205" y1="210" x2="235" y2="210" stroke="#ce93d8" stroke-width="1">
        <animateTransform 
          attributeName="transform" 
          type="translate" 
          values="0,0; 0,10; 0,0" 
          dur="6s" 
          repeatCount="indefinite"/>
      </line>
      <line x1="205" y1="220" x2="235" y2="220" stroke="#ce93d8" stroke-width="1">
        <animateTransform 
          attributeName="transform" 
          type="translate" 
          values="0,0; 0,10; 0,0" 
          dur="6s" 
          repeatCount="indefinite"/>
      </line>
      <line x1="205" y1="230" x2="235" y2="230" stroke="#ce93d8" stroke-width="1">
        <animateTransform 
          attributeName="transform" 
          type="translate" 
          values="0,0; 0,10; 0,0" 
          dur="6s" 
          repeatCount="indefinite"/>
      </line>
      
      <line x1="220" y1="195" x2="220" y2="235" stroke="#ce93d8" stroke-width="1">
        <animateTransform 
          attributeName="transform" 
          type="translate" 
          values="0,0; 0,10; 0,0" 
          dur="6s" 
          repeatCount="indefinite"/>
      </line>
    </g>
    
    <!-- Elementos binarios -->
    <rect x="150" y="190" width="40" height="20" rx="2" fill="url(#binaryPattern)" opacity="0.7">
      <animate 
        attributeName="opacity" 
        values="0.7;0.4;0.7" 
        dur="4s" 
        repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Lupa de análisis -->
  <g id="magnifier" filter="url(#shadowFilter)">
    <circle cx="200" cy="160" r="20" fill="none" stroke="#9c27b0" stroke-width="3" opacity="0.8">
      <animate 
        attributeName="r" 
        values="20;22;20" 
        dur="3s" 
        repeatCount="indefinite"/>
      <animate 
        attributeName="opacity" 
        values="0.8;0.4;0.8" 
        dur="3s" 
        repeatCount="indefinite"/>
    </circle>
    
    <line x1="215" y1="175" x2="230" y2="190" stroke="#9c27b0" stroke-width="4" stroke-linecap="round">
      <animate 
        attributeName="opacity" 
        values="1;0.5;1" 
        dur="3s" 
        repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Título en la parte superior -->
  <text x="200" y="50" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#673ab7">
    Análisis y procesamiento de datos
  </text>
</svg>
