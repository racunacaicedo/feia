<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Definiciones -->
  <defs>
    <!-- Gradientes y patrones -->
    <linearGradient id="boardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f5f5f5" />
    </linearGradient>
    
    <linearGradient id="chartGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4caf50" />
      <stop offset="100%" stop-color="#81c784" />
    </linearGradient>
    
    <linearGradient id="tableGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9fa8da" />
      <stop offset="100%" stop-color="#5c6bc0" />
    </linearGradient>
    
    <linearGradient id="personGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78909c" />
      <stop offset="100%" stop-color="#546e7a" />
    </linearGradient>
    
    <!-- Filtro para sombras -->
    <filter id="shadowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="3" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fondo -->
  <rect width="400" height="300" fill="#f8f8ff" />
  
  <!-- Pizarra/tablero de presentación -->
  <g id="board" filter="url(#shadowFilter)">
    <!-- Marco del tablero -->
    <rect x="80" y="70" width="240" height="160" rx="5" fill="url(#boardGradient)" stroke="#e0e0e0" stroke-width="2" />
    
    <!-- Base del tablero -->
    <path d="M150,230 L250,230 L240,240 L160,240 Z" fill="#bdbdbd" />
    <rect x="190" y="230" width="20" height="40" fill="#9e9e9e" />
    
    <!-- Gráfica de líneas -->
    <g id="chart">
      <path d="M100,180 L120,160 L140,170 L160,130 L180,140 L200,110 L220,100 L240,90 L260,80" fill="none" stroke="#2196f3" stroke-width="3">
        <animate attributeName="stroke-dasharray" from="0,500" to="500,0" dur="3s" begin="0.5s" fill="freeze" />
      </path>
      
      <!-- Puntos de datos -->
      <circle cx="120" cy="160" r="4" fill="#2196f3">
        <animate attributeName="r" values="0;4" dur="0.2s" begin="0.7s" fill="freeze" />
      </circle>
      <circle cx="140" cy="170" r="4" fill="#2196f3">
        <animate attributeName="r" values="0;4" dur="0.2s" begin="0.9s" fill="freeze" />
      </circle>
      <circle cx="160" cy="130" r="4" fill="#2196f3">
        <animate attributeName="r" values="0;4" dur="0.2s" begin="1.1s" fill="freeze" />
      </circle>
      <circle cx="180" cy="140" r="4" fill="#2196f3">
        <animate attributeName="r" values="0;4" dur="0.2s" begin="1.3s" fill="freeze" />
      </circle>
      <circle cx="200" cy="110" r="4" fill="#2196f3">
        <animate attributeName="r" values="0;4" dur="0.2s" begin="1.5s" fill="freeze" />
      </circle>
      <circle cx="220" cy="100" r="4" fill="#2196f3">
        <animate attributeName="r" values="0;4" dur="0.2s" begin="1.7s" fill="freeze" />
      </circle>
      <circle cx="240" cy="90" r="4" fill="#2196f3">
        <animate attributeName="r" values="0;4" dur="0.2s" begin="1.9s" fill="freeze" />
      </circle>
      <circle cx="260" cy="80" r="4" fill="#2196f3">
        <animate attributeName="r" values="0;4" dur="0.2s" begin="2.1s" fill="freeze" />
      </circle>
    </g>
    
    <!-- Gráfica de barras -->
    <g id="barChart">
      <rect x="100" y="180" width="10" height="0" fill="url(#chartGradient)">
        <animate attributeName="height" to="30" dur="1s" begin="2.5s" fill="freeze" />
        <animate attributeName="y" to="150" dur="1s" begin="2.5s" fill="freeze" />
      </rect>
      
      <rect x="120" y="180" width="10" height="0" fill="url(#chartGradient)">
        <animate attributeName="height" to="40" dur="1s" begin="2.7s" fill="freeze" />
        <animate attributeName="y" to="140" dur="1s" begin="2.7s" fill="freeze" />
      </rect>
      
      <rect x="140" y="180" width="10" height="0" fill="url(#chartGradient)">
        <animate attributeName="height" to="25" dur="1s" begin="2.9s" fill="freeze" />
        <animate attributeName="y" to="155" dur="1s" begin="2.9s" fill="freeze" />
      </rect>
      
      <rect x="160" y="180" width="10" height="0" fill="url(#chartGradient)">
        <animate attributeName="height" to="55" dur="1s" begin="3.1s" fill="freeze" />
        <animate attributeName="y" to="125" dur="1s" begin="3.1s" fill="freeze" />
      </rect>
    </g>
  </g>
  
  <!-- Consultor (silueta) -->
  <g id="consultant" filter="url(#shadowFilter)">
    <!-- Cabeza -->
    <circle cx="45" cy="120" r="15" fill="url(#personGradient)" />
    
    <!-- Cuerpo -->
    <rect x="35" y="135" width="20" height="35" rx="5" fill="url(#personGradient)" />
    
    <!-- Brazos -->
    <rect x="25" y="140" width="10" height="25" rx="5" fill="url(#personGradient)">
      <animateTransform
        attributeName="transform"
        type="rotate"
        values="0 35 140; 15 35 140; 0 35 140"
        dur="5s"
        repeatCount="indefinite"
        additive="sum"/>
    </rect>
    
    <rect x="55" y="140" width="10" height="25" rx="5" fill="url(#personGradient)">
      <animateTransform
        attributeName="transform"
        type="rotate"
        values="0 55 140; -15 55 140; 0 55 140"
        dur="5s"
        repeatCount="indefinite"
        additive="sum"/>
    </rect>
    
    <!-- Piernas -->
    <rect x="35" y="170" width="8" height="30" rx="4" fill="url(#personGradient)" />
    <rect x="47" y="170" width="8" height="30" rx="4" fill="url(#personGradient)" />
  </g>
  
  <!-- Elementos de consultoría flotantes -->
  <g id="consultingElements">
    <!-- Pensamiento/Ideas -->
    <g id="thoughtBubble">
      <ellipse cx="30" cy="90" rx="25" ry="15" fill="#ffffff" stroke="#bdbdbd" stroke-width="1" filter="url(#shadowFilter)">
        <animate
          attributeName="opacity"
          values="0; 1; 1; 0; 0"
          keyTimes="0; 0.1; 0.8; 0.9; 1"
          dur="10s"
          repeatCount="indefinite" />
      </ellipse>
      
      <circle cx="60" cy="95" r="5" fill="#ffffff" stroke="#bdbdbd" stroke-width="1">
        <animate
          attributeName="opacity"
          values="0; 1; 1; 0; 0"
          keyTimes="0; 0.15; 0.75; 0.85; 1"
          dur="10s"
          repeatCount="indefinite" />
      </circle>
      
      <circle cx="70" cy="100" r="3" fill="#ffffff" stroke="#bdbdbd" stroke-width="1">
        <animate
          attributeName="opacity"
          values="0; 1; 1; 0; 0"
          keyTimes="0; 0.2; 0.7; 0.8; 1"
          dur="10s"
          repeatCount="indefinite" />
      </circle>
      
      <!-- Iconos dentro de la burbuja de pensamiento -->
      <g id="thoughtIcons">
        <circle cx="20" cy="90" r="5" fill="#f44336">
          <animate
            attributeName="opacity"
            values="0; 1; 1; 0; 0"
            keyTimes="0; 0.25; 0.65; 0.75; 1"
            dur="10s"
            repeatCount="indefinite" />
        </circle>
        
        <rect x="30" y="85" width="10" height="10" fill="#4caf50">
          <animate
            attributeName="opacity"
            values="0; 1; 1; 0; 0"
            keyTimes="0; 0.3; 0.6; 0.7; 1"
            dur="10s"
            repeatCount="indefinite" />
        </rect>
      </g>
    </g>
    
    <!-- Documento de propuesta -->
    <g id="document" filter="url(#shadowFilter)">
      <rect x="300" y="120" width="60" height="80" rx="3" fill="#ffffff" stroke="#e0e0e0" stroke-width="1">
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; 0,-5; 0,0"
          dur="4s"
          repeatCount="indefinite" />
      </rect>
      
      <rect x="310" y="130" width="40" height="4" rx="2" fill="#e0e0e0">
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; 0,-5; 0,0"
          dur="4s"
          repeatCount="indefinite" />
      </rect>
      
      <rect x="310" y="140" width="40" height="4" rx="2" fill="#e0e0e0">
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; 0,-5; 0,0"
          dur="4s"
          repeatCount="indefinite" />
      </rect>
      
      <rect x="310" y="150" width="40" height="4" rx="2" fill="#e0e0e0">
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; 0,-5; 0,0"
          dur="4s"
          repeatCount="indefinite" />
      </rect>
      
      <rect x="310" y="160" width="30" height="4" rx="2" fill="#e0e0e0">
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; 0,-5; 0,0"
          dur="4s"
          repeatCount="indefinite" />
      </rect>
      
      <rect x="310" y="180" width="40" height="10" rx="3" fill="#5c6bc0">
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; 0,-5; 0,0"
          dur="4s"
          repeatCount="indefinite" />
      </rect>
    </g>
  </g>
  
  <!-- Título en la parte superior -->
  <text x="200" y="50" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#5c6bc0">
    Servicios de consultoría
  </text>
</svg>
