<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Definiciones -->
  <defs>
    <!-- Gradientes y patrones -->
    <linearGradient id="paperGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f0f0f0" />
    </linearGradient>

    <linearGradient id="folderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4caf50" />
      <stop offset="100%" stop-color="#2e7d32" />
    </linearGradient>

    <!-- Filtro para sombras -->
    <filter id="shadowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="3" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="400" height="300" fill="#f8f8ff" />

  <!-- Carpeta con documentos -->
  <g id="folder" filter="url(#shadowFilter)">
    <!-- Carpeta principal -->
    <path d="M100,90 L140,90 L150,100 L300,100 L300,220 L100,220 Z" fill="url(#folderGradient)" />

    <!-- Pestaña de la carpeta -->
    <path d="M140,90 L150,100 L140,100 Z" fill="#388e3c" />
  </g>

  <!-- Documentos -->
  <g id="documents">
    <!-- Documento 1 (más abajo) -->
    <rect id="doc1" x="120" y="110" width="180" height="120" rx="2" fill="url(#paperGradient)" filter="url(#shadowFilter)" />

    <!-- Documento 2 (en medio) -->
    <rect id="doc2" x="130" y="105" width="180" height="120" rx="2" fill="url(#paperGradient)" filter="url(#shadowFilter)">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0,0; -20,-15; 0,0"
        dur="6s"
        begin="0.5s"
        repeatCount="indefinite"
        keyTimes="0; 0.5; 1"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </rect>

    <!-- Documento 3 (arriba) -->
    <rect id="doc3" x="140" y="100" width="180" height="120" rx="2" fill="url(#paperGradient)" filter="url(#shadowFilter)">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0,0; -50,-30; 0,0"
        dur="6s"
        begin="0.5s"
        repeatCount="indefinite"
        keyTimes="0; 0.5; 1"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </rect>

    <!-- Contenido del documento 3 -->
    <g id="docContent">
      <!-- Título del documento -->
      <rect x="155" y="110" width="120" height="10" rx="2" fill="#e0e0e0">
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; -50,-30; 0,0"
          dur="6s"
          begin="0.5s"
          repeatCount="indefinite"
          keyTimes="0; 0.5; 1"
          keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      </rect>

      <!-- Líneas de texto -->
      <rect x="155" y="130" width="140" height="2" rx="1" fill="#e0e0e0">
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; -50,-30; 0,0"
          dur="6s"
          begin="0.5s"
          repeatCount="indefinite"
          keyTimes="0; 0.5; 1"
          keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      </rect>

      <rect x="155" y="140" width="140" height="2" rx="1" fill="#e0e0e0">
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; -50,-30; 0,0"
          dur="6s"
          begin="0.5s"
          repeatCount="indefinite"
          keyTimes="0; 0.5; 1"
          keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      </rect>

      <rect x="155" y="150" width="140" height="2" rx="1" fill="#e0e0e0">
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; -50,-30; 0,0"
          dur="6s"
          begin="0.5s"
          repeatCount="indefinite"
          keyTimes="0; 0.5; 1"
          keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      </rect>

      <rect x="155" y="160" width="140" height="2" rx="1" fill="#e0e0e0">
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; -50,-30; 0,0"
          dur="6s"
          begin="0.5s"
          repeatCount="indefinite"
          keyTimes="0; 0.5; 1"
          keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      </rect>

      <rect x="155" y="170" width="140" height="2" rx="1" fill="#e0e0e0">
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; -50,-30; 0,0"
          dur="6s"
          begin="0.5s"
          repeatCount="indefinite"
          keyTimes="0; 0.5; 1"
          keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      </rect>

      <rect x="155" y="180" width="140" height="2" rx="1" fill="#e0e0e0">
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; -50,-30; 0,0"
          dur="6s"
          begin="0.5s"
          repeatCount="indefinite"
          keyTimes="0; 0.5; 1"
          keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      </rect>

      <rect x="155" y="190" width="100" height="2" rx="1" fill="#e0e0e0">
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; -50,-30; 0,0"
          dur="6s"
          begin="0.5s"
          repeatCount="indefinite"
          keyTimes="0; 0.5; 1"
          keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      </rect>
    </g>

    <!-- Marcas de citas -->
    <g id="citations">
      <rect x="175" y="135" width="5" height="5" rx="1" fill="#42a5f5">
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; -50,-30; 0,0"
          dur="6s"
          begin="0.5s"
          repeatCount="indefinite"
          keyTimes="0; 0.5; 1"
          keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      </rect>

      <rect x="195" y="155" width="5" height="5" rx="1" fill="#42a5f5">
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; -50,-30; 0,0"
          dur="6s"
          begin="0.5s"
          repeatCount="indefinite"
          keyTimes="0; 0.5; 1"
          keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      </rect>

      <rect x="225" y="175" width="5" height="5" rx="1" fill="#42a5f5">
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; -50,-30; 0,0"
          dur="6s"
          begin="0.5s"
          repeatCount="indefinite"
          keyTimes="0; 0.5; 1"
          keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      </rect>
    </g>
  </g>

  <!-- Lupita que se mueve -->
  <g id="magnifier">
    <circle cx="260" cy="125" r="15" fill="none" stroke="#9c27b0" stroke-width="3" opacity="0.8">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0,0; 30,20; -10,50; 0,0"
        dur="6s"
        repeatCount="indefinite"
        keyTimes="0; 0.3; 0.7; 1"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"/>
      <animate
        attributeName="opacity"
        values="0; 0.8; 0.8; 0"
        dur="6s"
        repeatCount="indefinite"
        keyTimes="0; 0.1; 0.9; 1"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </circle>

    <line x1="271" y1="136" x2="281" y2="146" stroke="#9c27b0" stroke-width="3" opacity="0.8">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0,0; 30,20; -10,50; 0,0"
        dur="6s"
        repeatCount="indefinite"
        keyTimes="0; 0.3; 0.7; 1"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"/>
      <animate
        attributeName="opacity"
        values="0; 0.8; 0.8; 0"
        dur="6s"
        repeatCount="indefinite"
        keyTimes="0; 0.1; 0.9; 1"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </line>
  </g>

  <!-- Título en la parte superior -->
  <text x="200" y="50" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#2e7d32">
      <tspan x="200" y="50">Asesoría en el desarrollo</tspan>
      <tspan x="200" y="70">de documentos académicos</tspan>
  </text>

</svg>