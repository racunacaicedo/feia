<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Definiciones -->
  <defs>
    <!-- Gradientes y patrones -->
    <linearGradient id="phoneGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#424242" />
      <stop offset="100%" stop-color="#212121" />
    </linearGradient>
    
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#03a9f4" />
      <stop offset="100%" stop-color="#0277bd" />
    </linearGradient>
    
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#37474f" />
      <stop offset="100%" stop-color="#263238" />
    </linearGradient>
    
    <!-- Filtro para sombras -->
    <filter id="shadowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="3" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Animación de código escribiéndose -->
    <clipPath id="codeClip">
      <rect x="70" y="100" width="165" height="130" />
    </clipPath>
  </defs>
  
  <!-- Fondo -->
  <rect width="400" height="300" fill="#f8f8ff" />
  
  <!-- Monitor/Computadora con código -->
  <g id="computer" filter="url(#shadowFilter)">
    <!-- Marco del monitor -->
    <rect x="60" y="90" width="180" height="120" rx="5" fill="url(#codeGradient)" />
    
    <!-- Pantalla con código -->
    <rect x="70" y="100" width="160" height="100" fill="#263238" />
    
    <!-- Base del monitor -->
    <rect x="120" y="210" width="60" height="5" rx="2" fill="#424242" />
    <rect x="140" y="210" width="20" height="20" rx="2" fill="#424242" />
    
    <!-- Código animado -->
    <g clip-path="url(#codeClip)">
      <!-- Líneas de código -->
      <g id="codeLine1">
        <text x="75" y="115" font-family="monospace" font-size="9" fill="#26a69a">
          <animate attributeName="opacity" 
             values="0; 1" 
             dur="0.5s" 
             begin="0.2s"
             repeatCount="indefinite"
             keyTimes="0; 1"/>
          import UIKit
        </text>
      </g>
      
      <g id="codeLine2">
        <text x="75" y="130" font-family="monospace" font-size="9" fill="#42a5f5">
          <animate attributeName="opacity" 
             values="0; 1" 
             dur="0.5s" 
             begin="0.5s"
             repeatCount="indefinite"
             keyTimes="0; 1"/>
          class AppDelegate {
        </text>
      </g>
      
      <g id="codeLine3">
        <text x="80" y="145" font-family="monospace" font-size="9" fill="#ef5350">
          <animate attributeName="opacity" 
             values="0; 1" 
             dur="0.5s" 
             begin="0.8s"
             repeatCount="indefinite"
             keyTimes="0; 1"/>
          func application(
        </text>
      </g>
      
      <g id="codeLine4">
        <text x="85" y="160" font-family="monospace" font-size="9" fill="#ffca28">
          <animate attributeName="opacity" 
             values="0; 1" 
             dur="0.5s" 
             begin="1.1s"
             repeatCount="indefinite"
             keyTimes="0; 1"/>
          _ application: UIApp
        </text>
      </g>
      
      <g id="codeLine5">
        <text x="80" y="175" font-family="monospace" font-size="9" fill="#ef5350">
          <animate attributeName="opacity" 
             values="0; 1" 
             dur="0.5s" 
             begin="1.4s"
             repeatCount="indefinite"
             keyTimes="0; 1"/>
          return true
        </text>
      </g>
      
      <g id="codeLine6">
        <text x="75" y="190" font-family="monospace" font-size="9" fill="#42a5f5">
          <animate attributeName="opacity" 
             values="0; 1" 
             dur="0.5s" 
             begin="1.7s"
             repeatCount="indefinite"
             keyTimes="0; 1"/>
          }
        </text>
      </g>
      
      <!-- Cursor parpadeante -->
      <rect id="cursor" x="105" y="185" width="5" height="10" fill="#ffffff">
        <animate attributeName="opacity" 
           values="1; 1; 0; 0; 1" 
           dur="1s"
           begin="1.7s"
           repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
  
  <!-- Smartphone -->
  <g id="smartphone" filter="url(#shadowFilter)">
    <!-- Cuerpo del teléfono -->
    <rect x="270" y="100" width="70" height="130" rx="10" fill="url(#phoneGradient)" />
    
    <!-- Pantalla -->
    <rect x="275" y="110" width="60" height="100" rx="3" fill="url(#screenGradient)" />
    
    <!-- Botón home -->
    <circle cx="305" cy="220" r="7" fill="#616161" stroke="#9e9e9e" stroke-width="1" />
    
    <!-- Elementos de UI en la pantalla -->
    <g id="appInterface">
      <!-- Barra de estado -->
      <rect x="275" y="110" width="60" height="10" fill="#0277bd" />
      
      <!-- Íconos de aplicación -->
      <rect x="280" y="125" width="10" height="10" rx="2" fill="#f44336">
        <animate attributeName="opacity" 
           values="1; 0.5; 1" 
           dur="3s"
           begin="0.5s"
           repeatCount="indefinite"/>
      </rect>
      <rect x="295" y="125" width="10" height="10" rx="2" fill="#4caf50">
        <animate attributeName="opacity" 
           values="1; 0.5; 1" 
           dur="3s"
           begin="1s"
           repeatCount="indefinite"/>
      </rect>
      <rect x="310" y="125" width="10" height="10" rx="2" fill="#ff9800">
        <animate attributeName="opacity" 
           values="1; 0.5; 1" 
           dur="3s"
           begin="1.5s"
           repeatCount="indefinite"/>
      </rect>
      
      <rect x="280" y="140" width="10" height="10" rx="2" fill="#9c27b0">
        <animate attributeName="opacity" 
           values="1; 0.5; 1" 
           dur="3s"
           begin="0.7s"
           repeatCount="indefinite"/>
      </rect>
      <rect x="295" y="140" width="10" height="10" rx="2" fill="#e91e63">
        <animate attributeName="opacity" 
           values="1; 0.5; 1" 
           dur="3s"
           begin="1.2s"
           repeatCount="indefinite"/>
      </rect>
      <rect x="310" y="140" width="10" height="10" rx="2" fill="#3f51b5">
        <animate attributeName="opacity" 
           values="1; 0.5; 1" 
           dur="3s"
           begin="1.7s"
           repeatCount="indefinite"/>
      </rect>
      
      <rect x="280" y="155" width="10" height="10" rx="2" fill="#009688">
        <animate attributeName="opacity" 
           values="1; 0.5; 1" 
           dur="3s"
           begin="0.9s"
           repeatCount="indefinite"/>
      </rect>
      <rect x="295" y="155" width="10" height="10" rx="2" fill="#ffc107">
        <animate attributeName="opacity" 
           values="1; 0.5; 1" 
           dur="3s"
           begin="1.4s"
           repeatCount="indefinite"/>
      </rect>
      <rect x="310" y="155" width="10" height="10" rx="2" fill="#673ab7">
        <animate attributeName="opacity" 
           values="1; 0.5; 1" 
           dur="3s"
           begin="1.9s"
           repeatCount="indefinite"/>
      </rect>
      
      <!-- Ventana de aplicación abierta -->
      <g id="appWindow">
        <rect x="280" y="175" width="50" height="25" rx="3" fill="#ffffff">
          <animate attributeName="y" 
             values="175; 170; 175" 
             dur="4s"
             begin="2s"
             repeatCount="indefinite"/>
        </rect>
        <rect x="280" y="175" width="50" height="5" rx="1" fill="#f5f5f5">
          <animate attributeName="y" 
             values="175; 170; 175" 
             dur="4s"
             begin="2s"
             repeatCount="indefinite"/>
        </rect>
      </g>
    </g>
  </g>
  
  <!-- Engranajes que representan la configuración/desarrollo -->
  <g id="gears" filter="url(#shadowFilter)">
    <!-- Engranaje grande -->
    <path id="bigGear" d="M180,170 L185,185 L200,190 L185,195 L180,210 L175,195 L160,190 L175,185 Z" fill="#757575">
      <animateTransform 
        attributeName="transform" 
        type="rotate" 
        from="0 180 190" 
        to="360 180 190" 
        dur="10s" 
        repeatCount="indefinite"/>
    </path>
    
    <!-- Engranaje pequeño -->
    <path id="smallGear" d="M220,180 L223,188 L232,190 L223,192 L220,200 L217,192 L208,190 L217,188 Z" fill="#9e9e9e">
      <animateTransform 
        attributeName="transform" 
        type="rotate" 
        from="360 220 190" 
        to="0 220 190" 
        dur="7s" 
        repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Símbolos de código que flotan -->
  <g id="codeSymbols" filter="url(#shadowFilter)">
    <text x="230" y="120" font-family="monospace" font-size="14" fill="#e91e63" opacity="0.7">
      &lt; &gt;
      <animate 
        attributeName="y" 
        values="120; 110; 120" 
        dur="5s" 
        repeatCount="indefinite"/>
      <animate 
        attributeName="opacity" 
        values="0.7; 0.2; 0.7" 
        dur="5s" 
        repeatCount="indefinite"/>
    </text>
    
    <text x="230" y="150" font-family="monospace" font-size="14" fill="#2196f3" opacity="0.7">
      { }
      <animate 
        attributeName="y" 
        values="150; 160; 150" 
        dur="4s" 
        repeatCount="indefinite"/>
      <animate 
        attributeName="opacity" 
        values="0.7; 0.3; 0.7" 
        dur="4s" 
        repeatCount="indefinite"/>
    </text>
    
    <text x="245" y="135" font-family="monospace" font-size="14" fill="#4caf50" opacity="0.7">
      ( )
      <animate 
        attributeName="y" 
        values="135; 125; 135" 
        dur="6s" 
        repeatCount="indefinite"/>
      <animate 
        attributeName="opacity" 
        values="0.7; 0.4; 0.7" 
        dur="6s" 
        repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- Título en la parte superior -->
  <text x="200" y="50" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#0277bd">
    Desarrollo de Aplicaciones
  </text>
</svg>
