<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Fondo con gradiente suave -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f8ff" />
      <stop offset="100%" stop-color="#e6e6fa" />
    </linearGradient>

    <!-- Gradiente para el lomo del libro -->
    <linearGradient id="spineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5d4037" />
      <stop offset="50%" stop-color="#8d6e63" />
      <stop offset="100%" stop-color="#5d4037" />
    </linearGradient>

    <!-- Gradiente para las cubiertas -->
    <linearGradient id="coverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b1fa2" />
      <stop offset="100%" stop-color="#4a148c" />
    </linearGradient>

    <!-- Patrón para las páginas -->
    <pattern id="pagePattern" patternUnits="userSpaceOnUse" width="30" height="30">
      <rect width="30" height="30" fill="#fff8e1" />
      <line x1="0" y1="15" x2="30" y2="15" stroke="#f5f5f5" stroke-width="0.5" />
    </pattern>

    <!-- Filtro para la sombra -->
    <filter id="shadowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="2" dy="5" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="400" height="300" fill="url(#bgGradient)" />

  <!-- Sombra del libro -->
  <ellipse cx="200" cy="265" rx="150" ry="15" fill="#b0bec5" opacity="0.5" />

  <!-- Lomo del libro con textura -->
  <rect x="190" y="80" width="20" height="160" rx="2" fill="url(#spineGradient)" filter="url(#shadowFilter)" />
  <rect x="193" y="85" width="14" height="150" rx="1" fill="#4a148c" opacity="0.3" />

  <!-- Detalles del lomo -->
  <rect x="195" y="100" width="10" height="2" rx="1" fill="gold" />
  <rect x="195" y="120" width="10" height="2" rx="1" fill="gold" />
  <rect x="195" y="140" width="10" height="2" rx="1" fill="gold" />
  <rect x="195" y="160" width="10" height="2" rx="1" fill="gold" />
  <rect x="195" y="180" width="10" height="2" rx="1" fill="gold" />
  <rect x="195" y="200" width="10" height="2" rx="1" fill="gold" />

  <!-- Cubierta derecha (estática) -->
  <rect id="rightCover" x="210" y="80" width="125" height="160" rx="5" fill="url(#coverGradient)" filter="url(#shadowFilter)" />

  <!-- Cubierta izquierda (animada) -->
  <rect id="leftCover" x="65" y="80" width="125" height="160" rx="5" fill="url(#coverGradient)" filter="url(#shadowFilter)">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 190 80"
      to="-140 190 80"
      dur="4s"
      begin="0.5s"
      repeatCount="indefinite"
      keyTimes="0; 0.3; 0.4; 0.9; 1"
      values="0 190 80; -140 190 80; -140 190 80; 0 190 80; 0 190 80"
      calcMode="spline"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"/>
  </rect>

  <!-- Páginas del libro (animación) -->
  <g id="pages" filter="url(#shadowFilter)">
    <!-- Múltiples páginas que se animarán -->
    <rect id="page1" x="210" y="85" width="120" height="150" fill="url(#pagePattern)">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 210 85"
        to="-135 210 85"
        dur="4s"
        begin="0.6s"
        repeatCount="indefinite"
        keyTimes="0; 0.3; 0.4; 0.85; 1"
        values="0 210 85; -135 210 85; -135 210 85; 0 210 85; 0 210 85"
        calcMode="spline"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </rect>

    <rect id="page2" x="210" y="90" width="115" height="145" fill="url(#pagePattern)">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 210 90"
        to="-130 210 90"
        dur="4s"
        begin="0.7s"
        repeatCount="indefinite"
        keyTimes="0; 0.3; 0.4; 0.8; 1"
        values="0 210 90; -130 210 90; -130 210 90; 0 210 90; 0 210 90"
        calcMode="spline"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </rect>

    <rect id="page3" x="210" y="95" width="110" height="140" fill="url(#pagePattern)">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 210 95"
        to="-125 210 95"
        dur="4s"
        begin="0.8s"
        repeatCount="indefinite"
        keyTimes="0; 0.3; 0.4; 0.75; 1"
        values="0 210 95; -125 210 95; -125 210 95; 0 210 95; 0 210 95"
        calcMode="spline"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </rect>

    <rect id="page4" x="210" y="100" width="105" height="135" fill="url(#pagePattern)">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 210 100"
        to="-120 210 100"
        dur="4s"
        begin="0.9s"
        repeatCount="indefinite"
        keyTimes="0; 0.3; 0.4; 0.7; 1"
        values="0 210 100; -120 210 100; -120 210 100; 0 210 100; 0 210 100"
        calcMode="spline"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </rect>
  </g>

  <!-- Texto en las páginas (líneas simulando texto) -->
  <g id="textLines" fill="#333333">
    <!-- Líneas de texto en página visible -->
    <rect x="225" y="115" width="85" height="1.5" rx="0.75">
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="4s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <rect x="225" y="125" width="80" height="1.5" rx="0.75">
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="4s" repeatCount="indefinite" begin="1.1s"/>
    </rect>
    <rect x="225" y="135" width="90" height="1.5" rx="0.75">
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="4s" repeatCount="indefinite" begin="1.2s"/>
    </rect>
    <rect x="225" y="145" width="75" height="1.5" rx="0.75">
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="4s" repeatCount="indefinite" begin="1.3s"/>
    </rect>
    <rect x="225" y="155" width="85" height="1.5" rx="0.75">
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="4s" repeatCount="indefinite" begin="1.4s"/>
    </rect>
    <rect x="225" y="165" width="78" height="1.5" rx="0.75">
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="4s" repeatCount="indefinite" begin="1.5s"/>
    </rect>
    <rect x="225" y="175" width="88" height="1.5" rx="0.75">
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="4s" repeatCount="indefinite" begin="1.6s"/>
    </rect>
  </g>

  <!-- Detalles decorativos en la cubierta -->
  <g id="coverDetails">
    <!-- Marco dorado en cubierta derecha -->
    <rect x="220" y="90" width="105" height="140" rx="3" fill="none" stroke="gold" stroke-width="2" opacity="0.8" />
    <!-- Detalle central de la cubierta -->
    <ellipse cx="272.5" cy="160" rx="25" ry="25" fill="none" stroke="gold" stroke-width="1.5" />
    <!-- Título en la cubierta (estático) -->
    <text x="273" y="140" text-anchor="middle" font-family="serif" font-size="12" fill="gold" font-weight="bold">CURSOS</text>
  </g>

  <!-- Marcador de libro que sobresale ligeramente -->
  <path d="M270,230 L290,230 L280,245 Z" fill="#e53935" filter="url(#shadowFilter)">
    <animate attributeName="opacity" values="1;0.8;1" dur="4s" repeatCount="indefinite" />
  </path>
</svg>