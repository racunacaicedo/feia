<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Definiciones -->
  <defs>
    <!-- Gradientes y patrones -->
    <linearGradient id="paperGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f5f5f5" />
    </linearGradient>

    <linearGradient id="penGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3949ab" />
      <stop offset="100%" stop-color="#1a237e" />
    </linearGradient>

    <linearGradient id="inkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" />
      <stop offset="100%" stop-color="#263238" />
    </linearGradient>

    <!-- Filtro para sombras -->
    <filter id="shadowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="3" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="400" height="300" fill="#f8f8ff" />

  <!-- Papel -->
  <g id="paper" filter="url(#shadowFilter)">
    <rect x="100" y="70" width="200" height="180" rx="3" fill="url(#paperGradient)" />

    <!-- Líneas del papel -->
    <line x1="100" y1="90" x2="300" y2="90" stroke="#e0e0e0" stroke-width="1" />
    <line x1="100" y1="110" x2="300" y2="110" stroke="#e0e0e0" stroke-width="1" />
    <line x1="100" y1="130" x2="300" y2="130" stroke="#e0e0e0" stroke-width="1" />
    <line x1="100" y1="150" x2="300" y2="150" stroke="#e0e0e0" stroke-width="1" />
    <line x1="100" y1="170" x2="300" y2="170" stroke="#e0e0e0" stroke-width="1" />
    <line x1="100" y1="190" x2="300" y2="190" stroke="#e0e0e0" stroke-width="1" />
    <line x1="100" y1="210" x2="300" y2="210" stroke="#e0e0e0" stroke-width="1" />
    <line x1="100" y1="230" x2="300" y2="230" stroke="#e0e0e0" stroke-width="1" />

    <!-- Margen izquierdo -->
    <line x1="120" y1="70" x2="120" y2="250" stroke="#f0a0a0" stroke-width="1" opacity="0.5" />
  </g>

  <!-- Pluma estilográfica -->
  <g id="pen">
    <!-- Cuerpo de la pluma -->
    <path d="M280,100 L180,200 L185,205 L285,105 Z" fill="url(#penGradient)" filter="url(#shadowFilter)">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0,0; -40,40; -5,5; 0,0"
        dur="6s"
        repeatCount="indefinite"
        calcMode="spline"
        keyTimes="0; 0.4; 0.7; 1"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </path>

    <!-- Punta de la pluma -->
    <path d="M180,200 L170,210 L185,205 Z" fill="gold" filter="url(#shadowFilter)">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0,0; -40,40; -5,5; 0,0"
        dur="6s"
        repeatCount="indefinite"
        calcMode="spline"
        keyTimes="0; 0.4; 0.7; 1"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </path>

    <!-- Detalle de la pluma -->
    <path d="M245,135 L250,140 L255,135 L250,130 Z" fill="gold">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0,0; -40,40; -5,5; 0,0"
        dur="6s"
        repeatCount="indefinite"
        calcMode="spline"
        keyTimes="0; 0.4; 0.7; 1"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </path>
  </g>

  <!-- Texto que aparece -->
  <g id="writing">
    <!-- Primera línea de texto -->
    <text id="text1" x="130" y="105" font-family="cursive" font-size="14" fill="#333333" opacity="0">
      <animate attributeName="opacity"
         values="0; 0; 1; 1"
         dur="6s"
         begin="0.5s"
         repeatCount="indefinite"
         keyTimes="0; 0.4; 0.45; 1"/>
      Capítulo 1
    </text>

    <!-- Segunda línea de texto -->
    <text id="text2" x="130" y="145" font-family="cursive" font-size="12" fill="#333333" opacity="0">
      <animate attributeName="opacity"
         values="0; 0; 0; 0.2; 0.4; 0.6; 0.8; 1; 1"
         dur="6s"
         begin="1.5s"
         repeatCount="indefinite"
         keyTimes="0; 0.43; 0.44; 0.46; 0.48; 0.5; 0.52; 0.54; 1"/>
      Era una noche oscura y
    </text>

    <!-- Tercera línea de texto -->
    <text id="text3" x="130" y="165" font-family="cursive" font-size="12" fill="#333333" opacity="0">
      <animate attributeName="opacity"
         values="0; 0; 0; 0.2; 0.4; 0.6; 0.8; 1; 1"
         dur="6s"
         begin="2.5s"
         repeatCount="indefinite"
         keyTimes="0; 0.53; 0.54; 0.56; 0.58; 0.6; 0.62; 0.64; 1"/>
      tormentosa cuando...
    </text>
  </g>

  <!-- Gotas de tinta -->
  <circle id="ink1" cx="175" cy="205" r="2" fill="url(#inkGradient)">
    <animate attributeName="opacity"
       values="0; 0; 1; 0.9; 0.8; 0.7; 0.6; 0.5; 0"
       dur="6s"
       begin="1s"
       repeatCount="indefinite"
       keyTimes="0; 0.4; 0.42; 0.5; 0.55; 0.6; 0.7; 0.8; 1"/>
    <animate attributeName="cy"
       values="205; 205; 210; 220; 230"
       dur="6s"
       begin="1s"
       repeatCount="indefinite"
       keyTimes="0; 0.42; 0.5; 0.7; 1"/>
  </circle>

  <!-- Título en la parte superior del papel -->
  <text x="200" y="50" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#512DA8">
    Asesoría en la escritura de libros
  </text>
</svg>